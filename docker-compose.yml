# Self-hosted Mem0 for the poisoning harness.
#
# Mem0's OSS server stores memories across a vector DB + a relational/history DB.
# We run the three pieces it needs:
#   - mem0   : the REST API (the mem0ai client points MEM0_API_BASE here)
#   - qdrant : vector store for memory embeddings
#   - postgres : history / metadata store
#
# Bring up:    docker compose up -d
# Health:      curl http://localhost:8888/health   (harness also checks this before a run)
# Tear down:   docker compose down            (add -v to wipe poisoned state between clean runs)
#
# NOTE: the harness treats a fresh `docker compose down -v && up -d` as the way to
# get an uncontaminated baseline store between independent trials.

services:
  mem0:
    image: mem0/mem0-api-server:latest
    container_name: ap-mem0
    ports:
      - "8888:8000"
    environment:
      # LLM + embedder Mem0 uses for its own memory extraction/dedup.
      # Pinned via .env so the *backend's* model is reproducible, not just the victim's.
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MEM0_LLM_PROVIDER: ${MEM0_LLM_PROVIDER:-openai}
      MEM0_LLM_MODEL: ${MEM0_LLM_MODEL:-gpt-4o-mini}
      MEM0_EMBEDDER_MODEL: ${MEM0_EMBEDDER_MODEL:-text-embedding-3-small}
      # Wire the stores below.
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: mem0
      POSTGRES_USER: mem0
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mem0}
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ap-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    container_name: ap-postgres
    environment:
      POSTGRES_DB: mem0
      POSTGRES_USER: mem0
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mem0}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mem0 -d mem0"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  qdrant_data:
  postgres_data:
